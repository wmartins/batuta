services:
  postgres:
    image: postgres:18.4-bookworm
    environment:
      POSTGRES_DB: batuta
      POSTGRES_PASSWORD: batuta
      POSTGRES_USER: batuta
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batuta -d batuta"]
      interval: 2s
      timeout: 5s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - ./apps/server/docker/init-test-db.sql:/docker-entrypoint-initdb.d/001-test-db.sql:ro
      - batuta-postgres:/var/lib/postgresql

volumes:
  batuta-postgres:
